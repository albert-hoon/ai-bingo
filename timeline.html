<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워크숍 참석자 일정 타임라인</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a2240;
    --navy-light: #1a3a5c;
    --blue: #2980b9;
    --blue-light: #3498db;
    --sky: #e8f4fd;
    --sky-deep: #d6eaf8;
    --gray-bg: #f4f7fa;
    --gray-text: #5a7a9a;
    --gray-border: #d0dbe6;
    --white: #ffffff;
  }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    color: var(--navy);
    background: var(--gray-bg);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    padding: 40px 20px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .page-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .page-header h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .page-header p {
    color: var(--gray-text);
    font-size: 1rem;
  }

  .page-header .bar {
    width: 40px;
    height: 3px;
    background: var(--blue);
    margin: 16px auto 0;
    border-radius: 2px;
  }

  /* 범례 */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--gray-text);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .legend-dot.arrive { background: #27ae60; }
  .legend-dot.stay { background: var(--blue-light); opacity: 0.35; }
  .legend-dot.depart { background: #e74c3c; }
  .legend-dot.workshop { background: #f39c12; opacity: 0.2; border: 1px dashed #f39c12; }

  /* 타임라인 차트 */
  .chart-wrapper {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 16px;
    padding: 32px 24px 24px;
    overflow-x: auto;
    box-shadow: 0 4px 20px rgba(10,34,64,0.06);
  }

  .chart {
    min-width: 900px;
    position: relative;
  }

  /* 시간축 헤더 */
  .time-header {
    display: grid;
    grid-template-columns: 100px 1fr;
    margin-bottom: 8px;
  }

  .time-header .label { font-size: 0.75rem; color: var(--gray-text); font-weight: 600; }

  .time-axis {
    display: flex;
    position: relative;
    height: 40px;
    align-items: flex-end;
  }

  .date-block {
    text-align: center;
    position: relative;
    border-left: 1px solid var(--gray-border);
    padding-bottom: 4px;
  }

  .date-block .date-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--navy);
  }

  .date-block .day-label {
    font-size: 0.65rem;
    color: var(--gray-text);
  }

  /* 시간 눈금 */
  .hour-ticks {
    display: grid;
    grid-template-columns: 100px 1fr;
    border-bottom: 1px solid var(--gray-border);
    padding-bottom: 2px;
    margin-bottom: 4px;
  }

  .hour-ticks .spacer { }

  .ticks-row {
    display: flex;
    position: relative;
  }

  .tick {
    font-size: 0.6rem;
    color: #aaa;
    text-align: center;
    position: absolute;
    transform: translateX(-50%);
    top: 0;
  }

  /* 참석자 행 */
  .person-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    align-items: center;
    height: 52px;
    border-bottom: 1px solid #eef2f6;
    transition: background 0.15s;
  }

  .person-row:hover { background: #fafcfe; }

  .person-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 12px;
  }

  .person-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--sky-deep);
    flex-shrink: 0;
  }

  .person-name {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .bar-area {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
  }

  /* 워크숍 시간 배경 */
  .workshop-bg {
    position: absolute;
    top: 0;
    height: 100%;
    background: rgba(243, 156, 18, 0.08);
    border-left: 1px dashed rgba(243, 156, 18, 0.3);
    border-right: 1px dashed rgba(243, 156, 18, 0.3);
    pointer-events: none;
  }

  /* 체류 바 */
  .stay-bar {
    position: absolute;
    height: 28px;
    background: linear-gradient(90deg, rgba(52,152,219,0.15), rgba(52,152,219,0.25), rgba(52,152,219,0.15));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
    border: 1px solid rgba(52,152,219,0.2);
  }

  .marker {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .marker.arrive { background: #27ae60; }
  .marker.depart { background: #e74c3c; }

  .time-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.65rem;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .time-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--navy);
  }

  .marker:hover .time-tooltip,
  .stay-bar:hover .time-tooltip { opacity: 1; }

  .stay-label {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 0.65rem;
    color: var(--blue);
    font-weight: 500;
    pointer-events: none;
  }

  /* 날짜 구분선 */
  .date-line {
    position: absolute;
    top: 0;
    height: 100%;
    border-left: 1px solid var(--gray-border);
    pointer-events: none;
    z-index: 1;
  }

  /* 요약 카드 */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 32px;
  }

  .summary-card {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .summary-card .icon {
    width: 44px;
    height: 44px;
    background: var(--sky);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    margin: 0 auto 10px;
  }

  .summary-card h3 {
    font-size: 0.75rem;
    color: var(--gray-text);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .summary-card p {
    font-size: 1.1rem;
    font-weight: 700;
  }

  /* 반응형 */
  @media (max-width: 768px) {
    .page-header h1 { font-size: 1.5rem; }
    .chart-wrapper { padding: 20px 16px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="page-header">
    <h1>참석자 일정 타임라인</h1>
    <p>2026 국가인공지능전략위원회 사회분과 워크숍</p>
    <div class="bar"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot arrive"></div>제주 도착</div>
    <div class="legend-item"><div class="legend-dot stay"></div>제주 체류</div>
    <div class="legend-item"><div class="legend-dot depart"></div>제주 출발</div>
    <div class="legend-item"><div class="legend-dot workshop"></div>워크숍 시간 (4/7 09:00~18:00)</div>
  </div>

  <div class="chart-wrapper">
    <div class="chart" id="chart"></div>
  </div>

  <div class="summary-cards">
    <div class="summary-card">
      <div class="icon">👥</div>
      <h3>확정 참석자</h3>
      <p>5명</p>
    </div>
    <div class="summary-card">
      <div class="icon">✈️</div>
      <h3>가장 빠른 도착</h3>
      <p>유재연 (4/5 18:00)</p>
    </div>
    <div class="summary-card">
      <div class="icon">🕐</div>
      <h3>가장 늦은 출발</h3>
      <p>유재연 (4/8 20:50)</p>
    </div>
    <div class="summary-card">
      <div class="icon">⏱️</div>
      <h3>당일치기</h3>
      <p>김경훈 (4/7)</p>
    </div>
  </div>
</div>

<script>
const people = [
  { name: '유재연',  img: '유재연.png',  arrive: '2026-04-05T18:00', depart: '2026-04-08T20:50' },
  { name: '홍윤희',  img: '홍윤희.png',  arrive: '2026-04-07T07:35', depart: '2026-04-08T07:55' },
  { name: '김경훈',  img: '김경훈.png',  arrive: '2026-04-07T07:40', depart: '2026-04-07T21:20' },
  { name: '이원태',  img: '이원태.png',  arrive: '2026-04-07T07:50', depart: '2026-04-08T19:35' },
  { name: '김홍길',  img: '김홍길.png',  arrive: '2026-04-07T13:30', depart: '2026-04-08T11:40' },
];

// 타임라인 범위: 4/5 12:00 ~ 4/9 00:00
const timeStart = new Date('2026-04-05T12:00');
const timeEnd   = new Date('2026-04-09T00:00');
const totalMs   = timeEnd - timeStart;

// 워크숍 시간
const wsStart = new Date('2026-04-07T09:00');
const wsEnd   = new Date('2026-04-07T18:00');

function toPercent(date) {
  return ((new Date(date) - timeStart) / totalMs) * 100;
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${m}/${day} ${h}:${min}`;
}

function getDuration(arrive, depart) {
  const ms = new Date(depart) - new Date(arrive);
  const hours = Math.floor(ms / 3600000);
  const mins = Math.round((ms % 3600000) / 60000);
  if (hours >= 24) {
    const days = Math.floor(hours / 24);
    const remainH = hours % 24;
    return `${days}일 ${remainH}시간`;
  }
  return `${hours}시간 ${mins}분`;
}

const chart = document.getElementById('chart');

// 날짜 헤더
const dates = [
  { label: '4/5 (일)', start: '2026-04-05T12:00', end: '2026-04-06T00:00' },
  { label: '4/6 (월)', start: '2026-04-06T00:00', end: '2026-04-07T00:00' },
  { label: '4/7 (화) 워크숍', start: '2026-04-07T00:00', end: '2026-04-08T00:00' },
  { label: '4/8 (수)', start: '2026-04-08T00:00', end: '2026-04-09T00:00' },
];

// 시간 헤더 생성
let headerHTML = '<div class="time-header"><div class="label"></div><div class="time-axis">';
dates.forEach(d => {
  const left = toPercent(d.start);
  const width = toPercent(d.end) - left;
  headerHTML += `<div class="date-block" style="position:absolute;left:${left}%;width:${width}%;">
    <div class="date-label">${d.label}</div>
  </div>`;
});
headerHTML += '</div></div>';

// 시간 눈금
headerHTML += '<div class="hour-ticks"><div class="spacer"></div><div class="ticks-row" style="height:16px;position:relative;">';
for (let d = 5; d <= 8; d++) {
  const hoursToShow = d === 5 ? [12, 18] : [0, 6, 12, 18];
  hoursToShow.forEach(h => {
    const dt = new Date(`2026-04-0${d}T${String(h).padStart(2,'0')}:00`);
    if (dt >= timeStart && dt <= timeEnd) {
      const pct = toPercent(dt);
      headerHTML += `<span class="tick" style="left:${pct}%">${h}시</span>`;
    }
  });
}
headerHTML += '</div></div>';

chart.innerHTML = headerHTML;

// 참석자 행
people.forEach(p => {
  const arrPct = toPercent(p.arrive);
  const depPct = toPercent(p.depart);
  const barLeft = arrPct;
  const barWidth = depPct - arrPct;
  const wsBgLeft = toPercent(wsStart);
  const wsBgWidth = toPercent(wsEnd) - wsBgLeft;

  const row = document.createElement('div');
  row.className = 'person-row';
  row.innerHTML = `
    <div class="person-info">
      <img class="person-avatar" src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">
      <span class="person-name">${p.name}</span>
    </div>
    <div class="bar-area">
      <div class="workshop-bg" style="left:${wsBgLeft}%;width:${wsBgWidth}%"></div>
      ${dates.map((d,i) => i > 0 ? `<div class="date-line" style="left:${toPercent(d.start)}%"></div>` : '').join('')}
      <div class="stay-bar" style="left:${barLeft}%;width:${barWidth}%">
        <div class="marker arrive">
          <div class="time-tooltip">${formatTime(p.arrive)} 도착</div>
        </div>
        <div class="stay-label">${getDuration(p.arrive, p.depart)}</div>
        <div class="marker depart">
          <div class="time-tooltip">${formatTime(p.depart)} 출발</div>
        </div>
      </div>
    </div>
  `;
  chart.appendChild(row);
});
</script>

</body>
</html>
